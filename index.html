<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Listing to Excel Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-cyan-50 animate-gradient-x min-h-screen flex items-center justify-center p-4 sm:p-6 font-sans text-gray-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">

    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] p-6 sm:p-10 max-w-2xl w-full border border-white/50 relative overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-400/20 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-cyan-400/20 rounded-full blur-3xl pointer-events-none"></div>

        <div class="relative z-10">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 mb-2 tracking-tight">
                    Amazon Listing Converter
                </h1>
            </div>

            <div class="bg-indigo-50/50 p-1.5 rounded-xl border border-indigo-100 flex mb-3 relative">
                <button id="btnIndividual" onclick="setMode('individual')" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 shadow-sm bg-white text-indigo-600 relative z-10">
                    Individual Export
                </button>
                <button id="btnMerge" onclick="setMode('merge')" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 text-gray-500 hover:text-indigo-400 relative z-10">
                    Merge to 1 File
                </button>
            </div>
            
            <p id="modeDescription" class="text-center text-sm font-medium text-gray-500 mb-8 h-10 transition-all duration-300">
                Converts each uploaded .txt file into its own separate .xlsx file.
            </p>

            <div class="space-y-6">
                <div>
                    <div id="dropZone" onclick="document.getElementById('fileInput').click()" class="group relative flex flex-col items-center justify-center px-6 pt-8 pb-10 border-2 border-indigo-100 border-dashed rounded-2xl transition-all duration-300 bg-white/60 hover:bg-indigo-50/50 hover:border-indigo-400 hover:shadow-[0_0_30px_rgba(99,102,241,0.1)] cursor-pointer overflow-hidden">
                        <div class="space-y-2 text-center relative z-10 pointer-events-none">
                            <div class="bg-indigo-100/50 w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3 group-hover:scale-110 group-hover:bg-indigo-100 transition-all duration-300">
                                <svg class="h-7 w-7 text-indigo-500" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </div>
                            <div class="flex text-sm text-gray-600 justify-center items-baseline gap-1">
                                <span class="relative font-bold text-indigo-600 group-hover:text-indigo-500 transition-colors pointer-events-auto">
                                    Click to select
                                </span>
                                <span>or drag and drop</span>
                            </div>
                            <p class="text-xs text-gray-400 font-medium">Folders, .zip, and .txt files supported</p>
                        </div>
                    </div>
                    <input id="fileInput" type="file" class="hidden" accept=".txt,.zip" multiple>
                </div>

                <div id="fileListContainer" class="hidden space-y-3">
                    <h3 id="fileListTitle" class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-1">Selected Files</h3>
                    <div id="fileList" class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                        </div>
                </div>

                <button id="convertBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-[0_10px_20px_-10px_rgba(79,70,229,0.5)] hover:shadow-[0_15px_25px_-10px_rgba(79,70,229,0.6)] transform hover:-translate-y-0.5 transition-all duration-200 flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none disabled:hover:from-blue-600 disabled:hover:to-indigo-600" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span id="convertBtnText">Convert & Download Individual .xlsx</span>
                </button>
                
                <div id="statusLog" class="text-sm text-center font-bold h-4 text-emerald-500 drop-shadow-sm"></div>
            </div>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-gray-900/40 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-11/12 max-w-6xl h-5/6 flex flex-col overflow-hidden border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-100 rounded-lg text-indigo-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <h3 id="previewTitle" class="text-lg font-bold text-gray-800 truncate max-w-lg">File Preview</h3>
                </div>
                <button onclick="closePreview()" class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none p-1 rounded-lg hover:bg-red-50">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-auto bg-white custom-scrollbar relative">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm" id="previewTableHead">
                        </thead>
                    <tbody class="bg-white divide-y divide-gray-100" id="previewTableBody">
                        </tbody>
                </table>
            </div>
            
            <div class="px-6 py-3 border-t border-gray-100 bg-gray-50/50 text-xs text-gray-500 font-medium flex justify-between items-center">
                <span>Displaying preview matching output format (Top 100 rows maximum).</span>
                <button onclick="closePreview()" class="px-5 py-2 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-700 font-bold transition-colors shadow-sm focus:outline-none">Close Preview</button>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileList = document.getElementById('fileList');
        const convertBtn = document.getElementById('convertBtn');
        const convertBtnText = document.getElementById('convertBtnText');
        const statusLog = document.getElementById('statusLog');
        
        // Mode UI Elements
        const btnIndividual = document.getElementById('btnIndividual');
        const btnMerge = document.getElementById('btnMerge');
        const modeDescription = document.getElementById('modeDescription');
        const fileListTitle = document.getElementById('fileListTitle');

        let selectedFiles = [];
        let currentMode = 'individual'; 

        const masterColumnLayout = [
            "seller-sku", "asin1", "item-name", "item-description", "listing-id",
            "price", "quantity", "open-date", "product-id-type", "item-note",
            "item-condition", "will-ship-internationally", "expedited-shipping",
            "product-id", "pending-quantity", "fulfillment-channel", "business price",
            "status", "minimum-seller-allowed-price", "maximum-seller-allowed-price"
        ];

        const KNOWN_BRANDS = [
            "Evenflo", "Wonderfold", "Cole Haan", "Invirox", "Boppy", 
            "Arm's Reach", "Arm’s Reach", "Arms Reach", "Vertx", "Sebago", 
            "Moon Boots", "Moon Boot", "Fieldsheer", "Heartland Footwear", 
            "USCAPE", "Safetyshirtz", "Superga", "Scientific Anglers", 
            "Tru - Spec", "Tru-Spec", "Hultafors - HGNA", "Hultafors", 
            "Groundies", "Bumbleride", "Hootenanny Games", "Shurhold", 
            "Turtle Fur", "Riedell", "Cloud Nine Sheepskin", "Cloud Nine", "Wohali", 
            "Walker & Hawkes", "Walker and Hawkes", "Dinair", "Trenditions"
        ];

        const CUSTOM_MAPPINGS = [
            { trigger: "disco", brand: "Hootenanny Games" },
            { trigger: "hootenanny", brand: "Hootenanny Games" },
            { trigger: "walker", brand: "Walker & Hawkes" },
            { trigger: "dual", brand: "Fieldsheer" },
            { trigger: "snickers workwear", brand: "Hultafors" },
            { trigger: "cloud", brand: "Cloud Nine" },
            { trigger: "moon boot", brand: "Moon Boots" }
        ];

        window.setMode = function(mode) {
            currentMode = mode;
            if (mode === 'individual') {
                btnIndividual.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 shadow-sm bg-white text-indigo-600 relative z-10";
                btnMerge.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 text-gray-500 hover:text-indigo-400 relative z-10";
                modeDescription.innerHTML = "Converts each uploaded <span class='font-bold text-indigo-500'>.txt file</span> into its own separate <span class='font-bold text-emerald-500'>.xlsx file</span>.";
                fileListTitle.textContent = "Selected Files";
                convertBtnText.textContent = "Convert & Download Individual .xlsx";
            } else {
                btnMerge.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 shadow-sm bg-white text-indigo-600 relative z-10";
                btnIndividual.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 text-gray-500 hover:text-indigo-400 relative z-10";
                modeDescription.innerHTML = "Combines all uploaded <span class='font-bold text-indigo-500'>.txt files</span> into one single <span class='font-bold text-emerald-500'>.xlsx workbook</span> (each file on a separate tab).";
                fileListTitle.textContent = "Selected Files (Will become Tabs)";
                convertBtnText.textContent = "Merge & Download Single .xlsx";
            }
            renderFileList(); 
        }

        function renderFileList() {
            fileList.innerHTML = ''; 
            
            if (selectedFiles.length === 0) {
                fileListContainer.classList.add('hidden');
                convertBtn.disabled = true;
                return;
            }

            fileListContainer.classList.remove('hidden');
            convertBtn.disabled = false;

            const placeholderText = currentMode === 'individual' ? "Brand Name" : "Brand / Tab Name";

            selectedFiles.forEach((fileObj, index) => {
                const item = document.createElement('div');
                item.className = "group flex items-center gap-3 bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:border-indigo-100 transition-all duration-200";
                
                item.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="p-2 bg-indigo-50 rounded-lg text-indigo-500 shrink-0">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                        </div>
                        <div class="truncate text-sm text-gray-700 font-semibold" title="${fileObj.file.name}">
                            ${fileObj.file.name}
                        </div>
                    </div>
                    
                    <div class="w-40 sm:w-56 shrink-0">
                        <input type="text" id="brand-${index}" value="${fileObj.brand}" placeholder="${placeholderText}" 
                            oninput="updateBrandState(${index}, this.value)"
                            class="w-full px-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition-all placeholder-gray-400 font-medium" required>
                    </div>

                    <div class="flex items-center gap-1 shrink-0">
                        <button onclick="previewFile(${index})" class="text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 p-2 rounded-lg transition-colors focus:outline-none" title="Preview Data">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                        <button onclick="removeFile(${index})" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors focus:outline-none" title="Remove file">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                fileList.appendChild(item);
            });
        }

        window.updateBrandState = function(index, newValue) {
            selectedFiles[index].brand = newValue;
            const input = document.getElementById(`brand-${index}`);
            if(newValue.trim() !== '') {
                input.classList.remove('ring-2', 'ring-red-400', 'border-red-400');
            }
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        };

        // --- PREVIEW MODAL LOGIC ---
        window.previewFile = async function(index) {
            const fileObj = selectedFiles[index];
            const file = fileObj.file;
            document.getElementById('previewTitle').textContent = file.name;
            
            try {
                const text = await file.text();
                const lines = text.split(/\r?\n/);
                
                const tableHead = document.getElementById('previewTableHead');
                const tableBody = document.getElementById('previewTableBody');
                
                tableHead.innerHTML = '';
                tableBody.innerHTML = '';

                // Find header row
                let isHeaderFound = false;
                let headerRowIndex = -1;
                for (let row = 0; row < Math.min(lines.length, 5); row++) {
                    const columns = lines[row].split('\t').map(col => col.toLowerCase().trim());
                    if (columns.includes('item-name') || columns.includes('seller-sku')) {
                        isHeaderFound = true;
                        headerRowIndex = row;
                        break;
                    }
                }

                if (!isHeaderFound) {
                    alert("Could not detect valid Amazon headers in this file.");
                    return;
                }

                const originalHeaders = lines[headerRowIndex].split('\t').map(col => col.replace(/^"|"$/g, '').trim());
                
                // Sort headers exactly how the Excel file will be sorted
                const sortedHeaders = [...originalHeaders].sort((a, b) => {
                    let indexA = masterColumnLayout.indexOf(a.toLowerCase());
                    let indexB = masterColumnLayout.indexOf(b.toLowerCase());
                    if (indexA === -1) indexA = 999; if (indexB === -1) indexB = 999;
                    return indexA - indexB;
                });
                
                const headerMapping = sortedHeaders.map(header => originalHeaders.indexOf(header));

                // Render Table Head
                let theadHTML = '<tr>';
                sortedHeaders.forEach(th => {
                    theadHTML += `<th class="px-4 py-3 text-left text-[11px] font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap bg-gray-50 border-b border-gray-200">${th}</th>`;
                });
                theadHTML += '</tr>';
                tableHead.innerHTML = theadHTML;

                // Render Table Body (limit to 100 rows for performance)
                let tbodyHTML = '';
                let rowCount = 0;
                
                for (let i = headerRowIndex + 1; i < lines.length && rowCount < 100; i++) {
                    if (lines[i].trim() === "") continue;
                    
                    const rowData = lines[i].split('\t').map(col => col.replace(/^"|"$/g, '').trim());
                    
                    // Reorder data to match headers
                    const reorderedData = headerMapping.map((oldIndex, newIndex) => {
                        let val = rowData[oldIndex] !== undefined ? rowData[oldIndex] : "";
                        return val;
                    });

                    let trHTML = '<tr class="hover:bg-indigo-50/50 transition-colors">';
                    reorderedData.forEach(td => {
                        // Truncate long descriptions so the table doesn't stretch infinitely
                        trHTML += `<td class="px-4 py-2.5 text-sm text-gray-700 whitespace-nowrap max-w-[250px] truncate" title="${td}">${td}</td>`;
                    });
                    trHTML += '</tr>';
                    tbodyHTML += trHTML;
                    rowCount++;
                }
                
                tableBody.innerHTML = tbodyHTML;
                document.getElementById('previewModal').classList.remove('hidden');
                
            } catch (error) {
                console.error("Preview Error:", error);
                alert("An error occurred while loading the preview.");
            }
        };

        window.closePreview = function() {
            document.getElementById('previewModal').classList.add('hidden');
        };

        // --- BRAND EXTRACTION LOGIC ---
        async function extractBrand(text) {
            let extractedBrand = '';
            try {
                const lines = text.split(/\r?\n/);
                let nameColIndex = -1;
                let dataStartRow = -1;
                
                for (let row = 0; row < Math.min(lines.length, 5); row++) {
                    const columns = lines[row].split('\t').map(col => col.toLowerCase().trim());
                    nameColIndex = columns.findIndex(col => 
                        col.includes('item-name') || col.includes('item name') || col.includes('product name') || col === 'title'
                    );
                    if (nameColIndex !== -1) {
                        dataStartRow = row + 1; 
                        break;
                    }
                }
                
                if (nameColIndex !== -1 && dataStartRow < lines.length) {
                    let validItemNames = [];
                    for (let row = dataStartRow; row < lines.length; row++) {
                        const dataCols = lines[row].split('\t');
                        if (dataCols.length > nameColIndex && dataCols[nameColIndex].trim() !== '') {
                            validItemNames.push(dataCols[nameColIndex].trim());
                        }
                    }
                    
                    if (validItemNames.length > 0) {
                        const middleIndex = Math.floor(validItemNames.length / 2);
                        const middleItemName = validItemNames[middleIndex];
                        const lowerItemName = middleItemName.toLowerCase();
                        
                        let matchedBrand = "";
                        
                        for (let mapping of CUSTOM_MAPPINGS) {
                            if (lowerItemName.includes(mapping.trigger)) {
                                matchedBrand = mapping.brand;
                                break;
                            }
                        }
                        
                        if (matchedBrand === "") {
                            for (let brand of KNOWN_BRANDS) {
                                if (lowerItemName.includes(brand.toLowerCase())) {
                                    matchedBrand = brand;
                                    break;
                                }
                            }
                        }
                        
                        if (matchedBrand !== "") {
                            extractedBrand = matchedBrand;
                        } else {
                            extractedBrand = middleItemName.split(/\s+/)[0].replace(/[^a-zA-Z0-9-]/g, ''); 
                        }
                    }
                }
            } catch (error) {
                console.error("Error auto-extracting brand:", error);
            }
            return extractedBrand;
        }

        async function handleFiles(files) {
            const filesArray = Array.from(files);
            statusLog.innerHTML = `<svg class="animate-spin inline -ml-1 mr-2 h-4 w-4 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Scanning files...`;

            for (let i = 0; i < filesArray.length; i++) {
                const file = filesArray[i];

                if (file.name.toLowerCase().endsWith('.zip')) {
                    if (typeof JSZip !== 'undefined') {
                        const zip = new JSZip();
                        try {
                            const zipContent = await zip.loadAsync(file);
                            for (const relativePath in zipContent.files) {
                                const zipEntry = zipContent.files[relativePath];
                                if (!zipEntry.dir && relativePath.toLowerCase().endsWith('.txt')) {
                                    const text = await zipEntry.async("text");
                                    const mockFile = new File([text], relativePath.split('/').pop(), { type: 'text/plain' });
                                    const brand = await extractBrand(text);
                                    selectedFiles.push({ file: mockFile, brand: brand });
                                }
                            }
                        } catch (error) {
                            console.error("Error unzipping file:", error);
                        }
                    }
                } else if (file.name.toLowerCase().endsWith('.txt')) {
                    const text = await file.text();
                    const brand = await extractBrand(text);
                    selectedFiles.push({ file: file, brand: brand });
                }
            }
            
            renderFileList();
            statusLog.textContent = '';
        }

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = ''; 
        });

        async function getFilesFromDataTransfer(items) {
            let files = [];
            let entries = [];
            for (let i = 0; i < items.length; i++) {
                const entry = items[i].webkitGetAsEntry();
                if (entry) entries.push(entry);
            }

            const readEntry = async (entry) => {
                if (entry.isFile) {
                    return new Promise((resolve) => {
                        entry.file(f => {
                            if (f.name.toLowerCase().endsWith('.txt') || f.name.toLowerCase().endsWith('.zip')) {
                                files.push(f);
                            }
                            resolve();
                        });
                    });
                } else if (entry.isDirectory) {
                    const dirReader = entry.createReader();
                    return new Promise((resolve) => {
                        const readAll = () => {
                            dirReader.readEntries(async (dirEntries) => {
                                if (dirEntries.length === 0) {
                                    resolve();
                                } else {
                                    for (let e of dirEntries) await readEntry(e);
                                    readAll(); 
                                }
                            });
                        };
                        readAll();
                    });
                }
            };

            for (let entry of entries) {
                await readEntry(entry);
            }
            
            return files;
        }

        dropZone.addEventListener('dragenter', (e) => {
            e.preventDefault(); e.stopPropagation();
            dropZone.classList.add('border-indigo-400', 'bg-indigo-50/80', 'scale-[1.02]');
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault(); e.stopPropagation();
            dropZone.classList.add('border-indigo-400', 'bg-indigo-50/80', 'scale-[1.02]');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault(); e.stopPropagation();
            dropZone.classList.remove('border-indigo-400', 'bg-indigo-50/80', 'scale-[1.02]');
        });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault(); e.stopPropagation();
            dropZone.classList.remove('border-indigo-400', 'bg-indigo-50/80', 'scale-[1.02]');
            
            if (e.dataTransfer && e.dataTransfer.items) {
                statusLog.innerHTML = `<svg class="animate-spin inline -ml-1 mr-2 h-4 w-4 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Scanning dropped folders...`;
                const files = await getFilesFromDataTransfer(e.dataTransfer.items);
                if (files.length > 0) {
                    await handleFiles(files);
                } else {
                    statusLog.textContent = 'No .txt or .zip files found in dropped items.';
                    setTimeout(() => statusLog.textContent = '', 3000);
                }
            } else if (e.dataTransfer && e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        function getFormattedTime() {
            const now = new Date();
            const estDate = new Date(now.toLocaleString("en-US", {timeZone: "America/New_York"}));
            let hours = estDate.getHours();
            let minutes = estDate.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const hoursStr = hours < 10 ? '0' + hours : hours;
            const minutesStr = minutes < 10 ? '0' + minutes : minutes;
            return `${hoursStr}${minutesStr} ${ampm} EST`;
        }

        convertBtn.addEventListener('click', async () => {
            let allFilled = true;
            for (let i = 0; i < selectedFiles.length; i++) {
                const input = document.getElementById(`brand-${i}`);
                if (!input.value.trim()) {
                    input.classList.add('ring-2', 'ring-red-400', 'border-red-400'); 
                    allFilled = false;
                }
            }

            if (!allFilled) {
                convertBtn.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => convertBtn.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
                return;
            }

            const originalBtnHTML = convertBtn.innerHTML;
            convertBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing Files...`;
            convertBtn.disabled = true;

            try {
                if (currentMode === 'individual') {
                    let processedCount = 0;

                    for (let i = 0; i < selectedFiles.length; i++) {
                        const fileObj = selectedFiles[i];
                        const file = fileObj.file;
                        const brandName = document.getElementById(`brand-${i}`).value.trim();
                        
                        const workbook = new ExcelJS.Workbook();
                        const worksheet = workbook.addWorksheet('Listings');
                        
                        worksheet.views = [{ state: 'frozen', ySplit: 1 }];

                        const text = await file.text();
                        const lines = text.split(/\r?\n/);
                        
                        let isHeaderFound = false;
                        let headerMapping = []; 
                        let skuOriginalIndex = -1;
                        let validSkuCount = 0;

                        lines.forEach(line => {
                            if (line.trim() !== "") {
                                const rowData = line.split('\t').map(col => col.replace(/^"|"$/g, '').trim());

                                if (!isHeaderFound) {
                                    const lowerLine = line.toLowerCase();
                                    if (lowerLine.includes('item-name') || lowerLine.includes('seller-sku')) {
                                        isHeaderFound = true;
                                        const originalHeaders = rowData;

                                        skuOriginalIndex = originalHeaders.findIndex(h => h.toLowerCase() === 'seller-sku');

                                        const sortedHeaders = [...originalHeaders].sort((a, b) => {
                                            let indexA = masterColumnLayout.indexOf(a.toLowerCase());
                                            let indexB = masterColumnLayout.indexOf(b.toLowerCase());
                                            if (indexA === -1) indexA = 999; if (indexB === -1) indexB = 999;
                                            return indexA - indexB;
                                        });

                                        headerMapping = sortedHeaders.map(header => originalHeaders.indexOf(header));
                                        const row = worksheet.addRow(sortedHeaders);
                                        row.eachCell(cell => { cell.font = { name: 'Calibri', size: 11 }; });
                                    }
                                } else {
                                    if (skuOriginalIndex !== -1 && rowData[skuOriginalIndex] !== undefined && rowData[skuOriginalIndex] !== "") {
                                        validSkuCount++; 
                                    }

                                    const reorderedData = headerMapping.map((oldIndex, newIndex) => {
                                        let val = rowData[oldIndex] !== undefined ? rowData[oldIndex] : "";
                                        let colName = masterColumnLayout[newIndex];

                                        if (colName === 'seller-sku') {
                                            return String(val);
                                        }
                                        if (val !== "" && !isNaN(val)) {
                                            if (!/^0\d+/.test(val)) return Number(val);
                                        }
                                        return val;
                                    });

                                    const row = worksheet.addRow(reorderedData);
                                    row.eachCell((cell, colNumber) => { 
                                        cell.font = { name: 'Calibri', size: 11 }; 
                                        if (masterColumnLayout[colNumber - 1] === 'seller-sku') {
                                            cell.numFmt = '@'; 
                                        }
                                    });
                                }
                            }
                        });

                        const originalName = file.name.replace('.txt', '');
                        const timeString = getFormattedTime();
                        const newFileName = `${brandName} ${originalName} ${timeString} - ${validSkuCount} SKUs.xlsx`;

                        const buffer = await workbook.xlsx.writeBuffer();
                        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                        const url = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = newFileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        
                        processedCount++;
                    }

                    statusLog.innerHTML = `🎉 Successfully downloaded ${processedCount} separate file(s)!`;

                } else {
                    let masterSkuCount = 0;
                    const workbook = new ExcelJS.Workbook();

                    for (let i = 0; i < selectedFiles.length; i++) {
                        const fileObj = selectedFiles[i];
                        const file = fileObj.file;
                        const brandName = document.getElementById(`brand-${i}`).value.trim();
                        
                        let safeTabName = brandName.replace(/[\\/*?:\[\]]/g, '').substring(0, 31) || `Tab_${i+1}`;
                        let tabBase = safeTabName;
                        let counter = 1;
                        while(workbook.getWorksheet(safeTabName)) {
                            safeTabName = `${tabBase.substring(0, 27)}_${counter}`;
                            counter++;
                        }

                        const worksheet = workbook.addWorksheet(safeTabName);
                        
                        worksheet.views = [{ state: 'frozen', ySplit: 1 }];

                        const text = await file.text();
                        const lines = text.split(/\r?\n/);
                        
                        let isHeaderFound = false;
                        let headerMapping = []; 
                        let skuOriginalIndex = -1;

                        lines.forEach(line => {
                            if (line.trim() !== "") {
                                const rowData = line.split('\t').map(col => col.replace(/^"|"$/g, '').trim());

                                if (!isHeaderFound) {
                                    const lowerLine = line.toLowerCase();
                                    if (lowerLine.includes('item-name') || lowerLine.includes('seller-sku')) {
                                        isHeaderFound = true;
                                        const originalHeaders = rowData;

                                        skuOriginalIndex = originalHeaders.findIndex(h => h.toLowerCase() === 'seller-sku');

                                        const sortedHeaders = [...originalHeaders].sort((a, b) => {
                                            let indexA = masterColumnLayout.indexOf(a.toLowerCase());
                                            let indexB = masterColumnLayout.indexOf(b.toLowerCase());
                                            if (indexA === -1) indexA = 999; if (indexB === -1) indexB = 999;
                                            return indexA - indexB;
                                        });

                                        headerMapping = sortedHeaders.map(header => originalHeaders.indexOf(header));
                                        const row = worksheet.addRow(sortedHeaders);
                                        row.eachCell(cell => { cell.font = { name: 'Calibri', size: 11 }; });
                                    }
                                } else {
                                    if (skuOriginalIndex !== -1 && rowData[skuOriginalIndex] !== undefined && rowData[skuOriginalIndex] !== "") {
                                        masterSkuCount++; 
                                    }

                                    const reorderedData = headerMapping.map((oldIndex, newIndex) => {
                                        let val = rowData[oldIndex] !== undefined ? rowData[oldIndex] : "";
                                        let colName = masterColumnLayout[newIndex];

                                        if (colName === 'seller-sku' || colName === 'asin1' || colName === 'product-id' || colName === 'listing-id') {
                                            return String(val);
                                        }
                                        if (val !== "" && !isNaN(val)) {
                                            if (!/^0\d+/.test(val)) return Number(val);
                                        }
                                        return val;
                                    });

                                    const row = worksheet.addRow(reorderedData);
                                    row.eachCell((cell, colNumber) => { 
                                        cell.font = { name: 'Calibri', size: 11 }; 
                                        if (masterColumnLayout[colNumber - 1] === 'seller-sku') {
                                            cell.numFmt = '@'; 
                                        }
                                    });
                                }
                            }
                        });
                    }

                    const timeString = getFormattedTime();
                    const newFileName = `Combined Listings ${timeString} - ${masterSkuCount} SKUs.xlsx`;

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = newFileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    statusLog.innerHTML = `🎉 Successfully merged ${selectedFiles.length} file(s) into 1 workbook!`;
                }

            } catch (error) {
                console.error("Error processing files:", error);
                alert("An error occurred while building the Excel file. Please check the console.");
            } finally {
                convertBtn.innerHTML = originalBtnHTML;
                convertBtn.disabled = false;
                setTimeout(() => { statusLog.innerHTML = ''; }, 6000);
            }
        });
    </script>
</body>
